<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>자막 프리뷰어 - 스마트 파싱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #1a1a1a;
            color: #e5e5e5;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            height: -webkit-fill-available;
        }

        .editor-container {
            height: 100vh;
            height: 100svh;
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 768px) {
            .editor-container {
                flex-direction: row;
            }
            .input-section {
                width: 380px;
                height: 100% !important;
                border-right: 1px solid #404040;
                border-bottom: none;
            }
        }

        .input-section {
            background-color: #262626;
            display: flex;
            flex-direction: column;
            padding: 0.75rem;
            z-index: 20;
            height: 35%; 
            border-bottom: 1px solid #404040;
            flex-shrink: 0;
        }

        .preview-section {
            flex-grow: 1;
            background-color: #000;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding-bottom: env(safe-area-inset-bottom);
        }

        textarea {
            flex-grow: 1;
            background-color: #121212;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid #404040;
            resize: none;
            outline: none;
            font-size: 0.8rem;
            line-height: 1.4;
        }

        #subtitle-display {
            color: white;
            font-size: 1.4rem;
            text-align: center;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 1);
            max-width: 90%;
            line-height: 1.4;
            transition: opacity 0.2s ease;
            pointer-events: none;
            white-space: pre-wrap;
            font-weight: 700;
            z-index: 5;
            margin-bottom: 2rem;
        }

        @media (min-width: 768px) {
            #subtitle-display {
                font-size: 2.5rem;
                margin-bottom: 0;
            }
        }

        .controls {
            position: absolute;
            bottom: 1rem;
            background: rgba(45, 45, 45, 0.9);
            padding: 0.5rem 0.8rem;
            border-radius: 12px;
            display: flex;
            gap: 0.75rem;
            align-items: center;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            width: 92%;
            max-width: 480px;
            justify-content: space-between;
            z-index: 15;
        }

        .preview-section.hide-cursor .controls {
            opacity: 0;
            pointer-events: none;
        }

        .time-display {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            color: #fbbf24;
            min-width: 60px;
            text-align: right;
        }

        button {
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        input[type="range"] {
            flex: 1;
            height: 6px;
            border-radius: 3px;
        }
    </style>
</head>
<body>

<div class="editor-container">
    <div class="input-section">
        <div class="flex justify-between items-center mb-1">
            <h1 class="text-sm font-bold text-indigo-400">Subtitle Editor</h1>
            <div id="parse-status" class="text-[10px] text-gray-400 bg-black/30 px-2 py-0.5 rounded-full">
                <span class="status-dot bg-yellow-500"></span> 대기 중
            </div>
        </div>
        
        <textarea id="vtt-input" spellcheck="false" placeholder="여기에 자막을 붙여넣으세요...">자막 프리뷰어입니다

엔터를 두 번 누르면 2초를 쉽니다.
마침표가 있으면 0.5초를 더 쉽니다.

이렇게 말이죠.</textarea>

        <div class="mt-2">
            <button id="apply-btn" class="w-full bg-indigo-600 active:bg-indigo-800 text-white py-2 rounded-lg font-bold text-sm shadow-md transition-colors">
                적용하기
            </button>
        </div>
    </div>

    <div class="preview-section" id="fullscreen-target">
        <div id="subtitle-display"></div>

        <div class="controls" id="ui-controls">
            <button id="play-pause">
                <svg id="play-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="white" viewBox="0 0 16 16">
                    <path d="m11.596 8.697-6.363 3.692c-.54.313-1.233-.066-1.233-.697V4.308c0-.63.692-1.01 1.233-.696l6.363 3.692a.802.802 0 0 1 0 1.393z"/>
                </svg>
                <svg id="pause-icon" class="hidden" xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="white" viewBox="0 0 16 16">
                    <path d="M5.5 3.5A1.5 1.5 0 0 1 7 5v6a1.5 1.5 0 0 1-3 0V5a1.5 1.5 0 0 1 1.5-1.5zm5 0A1.5 1.5 0 0 1 12 5v6a1.5 1.5 0 0 1-3 0V5a1.5 1.5 0 0 1 1.5-1.5z"/>
                </svg>
            </button>
            
            <input type="range" id="seek-bar" class="accent-indigo-500" value="0" step="0.01" min="0">
            
            <div class="time-display" id="time-display">00:00.0</div>
            
            <button id="fullscreen-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="white" viewBox="0 0 16 16">
                    <path d="M1.5 1a.5.5 0 0 0-.5.5v4a.5.5 0 0 1-1 0v-4A1.5 1.5 0 0 1 1.5 0h4a.5.5 0 0 1 0 1h-4zM10 .5a.5.5 0 0 1 .5-.5h4A1.5 1.5 0 0 1 16 1.5v4a.5.5 0 0 1-1 0v-4a.5.5 0 0 0-.5-.5h-4a.5.5 0 0 1-.5-.5zM.5 10a.5.5 0 0 1 .5.5v4a.5.5 0 0 0 .5.5h4a.5.5 0 0 1 0 1h-4A1.5 1.5 0 0 1 0 14.5v-4a.5.5 0 0 1 .5-.5zm15 0a.5.5 0 0 1 .5.5v4a1.5 1.5 0 0 1-1.5 1.5h-4a.5.5 0 0 1 0-1h4a.5.5 0 0 0 .5-.5v-4a.5.5 0 0 1 .5-.5z"/>
                </svg>
            </button>
        </div>
    </div>
</div>

<script>
    const vttInput = document.getElementById('vtt-input');
    const subtitleDisplay = document.getElementById('subtitle-display');
    const playPauseBtn = document.getElementById('play-pause');
    const seekBar = document.getElementById('seek-bar');
    const timeDisplay = document.getElementById('time-display');
    const applyBtn = document.getElementById('apply-btn');
    const fullscreenBtn = document.getElementById('fullscreen-btn');
    const fullscreenTarget = document.getElementById('fullscreen-target');
    const playIcon = document.getElementById('play-icon');
    const pauseIcon = document.getElementById('pause-icon');
    const statusDot = document.querySelector('.status-dot');
    const statusText = document.getElementById('parse-status');

    let cues = [];
    let currentTime = 0;
    let isPlaying = false;
    let lastTimestamp = 0;
    let maxTime = 10;
    let hideTimer;

    function parseSubtitlesSmart(text) {
        const rawLines = text.split('\n');
        const timePairRegex = /((?:\d+:)?(?:\d+:)?\d+[.,]\d{1,3})\s*-->\s*((?:\d+:)?(?:\d+:)?\d+[.,]\d{1,3})/;
        const hasTimestamps = text.match(timePairRegex);
        
        if (hasTimestamps) {
            const results = [];
            let currentCue = null;
            for (let line of rawLines) {
                line = line.trim();
                const match = line.match(timePairRegex);
                if (match) {
                    if (currentCue) results.push(currentCue);
                    currentCue = { start: timeToSeconds(match[1]), end: timeToSeconds(match[2]), text: "" };
                } else if (currentCue && line && !/^\d+$/.test(line) && line.toUpperCase() !== 'WEBVTT') {
                    currentCue.text += (currentCue.text ? "\n" : "") + line;
                }
            }
            if (currentCue) results.push(currentCue);
            return results.filter(c => c.text).sort((a,b) => a.start - b.start);
        } else {
            // 엔터(줄내림) 기반 스마트 로직
            const results = [];
            let autoStartTime = 0;
            const durationPerLine = 3; 
            const dotPause = 0.5;   // 마침표 뒤 추가 공백
            const emptyLinePause = 2.0; // 빈 줄(엔터 두 번) 시 공백

            for (let i = 0; i < rawLines.length; i++) {
                const line = rawLines[i].trim();
                
                if (line === '') {
                    // 빈 줄인 경우 2초 시간을 건너뜀
                    autoStartTime += emptyLinePause;
                    continue;
                }

                // 일반 텍스트 줄
                const isEndedWithDot = line.endsWith('.');
                const start = autoStartTime;
                const end = autoStartTime + durationPerLine;
                
                results.push({
                    start: start,
                    end: end,
                    text: line
                });

                // 다음 시작 시간 결정: 3초 + (마침표가 있으면 0.5초 추가)
                autoStartTime = end + (isEndedWithDot ? dotPause : 0);
            }
            return results;
        }
    }

    function timeToSeconds(timeStr) {
        if (!timeStr) return 0;
        const normalized = timeStr.replace(',', '.');
        const parts = normalized.split(':').reverse();
        let seconds = 0;
        if (parts[0]) seconds += parseFloat(parts[0]);
        if (parts[1]) seconds += parseInt(parts[1]) * 60;
        if (parts[2]) seconds += parseInt(parts[2]) * 3600;
        return seconds;
    }

    function formatTime(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = (seconds % 60).toFixed(1);
        return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(4, '0')}`;
    }

    function updateDisplay() {
        if (currentTime >= maxTime - 0.1) {
            subtitleDisplay.innerText = "끝";
            subtitleDisplay.style.opacity = 1;
            subtitleDisplay.style.color = "#ffffff";
            if (isPlaying) {
                isPlaying = false;
                updatePlayStatus();
            }
        } else {
            const activeCue = cues.find(cue => currentTime >= cue.start && currentTime < cue.end);
            subtitleDisplay.style.color = "white";
            if (activeCue) {
                if (subtitleDisplay.innerText !== activeCue.text) {
                    subtitleDisplay.innerText = activeCue.text;
                    subtitleDisplay.style.opacity = 1;
                }
            } else {
                subtitleDisplay.style.opacity = 0;
            }
        }
        
        timeDisplay.innerText = formatTime(currentTime);
        seekBar.value = currentTime;
    }

    function animate(timestamp) {
        if (!isPlaying) return;
        if (!lastTimestamp) lastTimestamp = timestamp;
        const delta = (timestamp - lastTimestamp) / 1000;
        lastTimestamp = timestamp;

        currentTime += delta;
        
        if (currentTime >= maxTime) {
            currentTime = maxTime;
            isPlaying = false;
            updatePlayStatus();
            updateDisplay();
            return;
        }
        
        updateDisplay();
        requestAnimationFrame(animate);
    }

    function updatePlayStatus() {
        if (isPlaying) {
            playIcon.classList.add('hidden');
            pauseIcon.classList.remove('hidden');
        } else {
            playIcon.classList.remove('hidden');
            pauseIcon.classList.add('hidden');
        }
    }

    function togglePlay() {
        if (cues.length === 0) return;
        if (currentTime >= maxTime) currentTime = 0;
        
        isPlaying = !isPlaying;
        updatePlayStatus();
        if (isPlaying) {
            lastTimestamp = 0;
            requestAnimationFrame(animate);
        }
    }

    fullscreenBtn.onclick = () => {
        if (!document.fullscreenElement) {
            if (fullscreenTarget.requestFullscreen) fullscreenTarget.requestFullscreen();
            else if (fullscreenTarget.webkitRequestFullscreen) fullscreenTarget.webkitRequestFullscreen();
        } else {
            document.exitFullscreen();
        }
    };

    playPauseBtn.onclick = (e) => {
        e.stopPropagation();
        togglePlay();
    };

    seekBar.oninput = (e) => {
        currentTime = parseFloat(e.target.value);
        updateDisplay();
    };

    applyBtn.onclick = () => {
        const text = vttInput.value;
        const newCues = parseSubtitlesSmart(text);
        
        if (newCues.length > 0) {
            cues = newCues;
            maxTime = Math.max(...cues.map(c => c.end));
            seekBar.max = maxTime;
            currentTime = 0; 
            
            statusDot.className = "status-dot bg-green-500";
            statusText.innerHTML = `<span class="status-dot bg-green-500"></span> ${cues.length}줄 로드됨`;
            
            applyBtn.innerText = "적용됨";
            applyBtn.classList.replace('bg-indigo-600', 'bg-green-600');
            setTimeout(() => {
                applyBtn.innerText = "적용하기";
                applyBtn.classList.replace('bg-green-600', 'bg-indigo-600');
            }, 800);
            updateDisplay();
        } else {
            statusDot.className = "status-dot bg-red-500";
            statusText.innerHTML = `<span class="status-dot bg-red-500"></span> 내용 없음`;
        }
    };

    fullscreenTarget.onclick = () => {
        fullscreenTarget.classList.remove('hide-cursor');
        clearTimeout(hideTimer);
        hideTimer = setTimeout(() => {
            if (isPlaying) fullscreenTarget.classList.add('hide-cursor');
        }, 3000);
    };

    window.onload = () => {
        applyBtn.click();
    };
</script>

</body>
</html>
