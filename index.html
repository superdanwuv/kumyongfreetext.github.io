<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>자막 프리뷰어 - 클라우드 & 레코딩</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #1a1a1a;
            color: #e5e5e5;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            height: -webkit-fill-available;
        }

        .editor-container {
            height: 100vh;
            height: 100svh;
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 768px) {
            .editor-container {
                flex-direction: row;
            }
            .input-section {
                width: 400px;
                height: 100% !important;
                border-right: 1px solid #404040;
                border-bottom: none;
            }
        }

        .input-section {
            background-color: #262626;
            display: flex;
            flex-direction: column;
            padding: 0.75rem;
            z-index: 20;
            height: 55%; 
            border-bottom: 1px solid #404040;
            flex-shrink: 0;
            gap: 0.5rem;
            transition: height 0.3s ease;
        }

        .input-section.expanded {
            height: 90%;
        }

        .preview-section {
            flex-grow: 1;
            background-color: #000;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding-bottom: env(safe-area-inset-bottom);
        }

        textarea {
            flex-grow: 1;
            background-color: #121212;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid #404040;
            resize: none;
            outline: none;
            font-size: 0.85rem;
            line-height: 1.5;
        }

        input[type="text"] {
            background-color: #121212;
            border: 1px solid #404040;
            color: white;
            padding: 0.4rem 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.8rem;
            outline: none;
        }

        #subtitle-display {
            color: white;
            font-size: 1.4rem;
            text-align: center;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 1);
            max-width: 90%;
            line-height: 1.4;
            transition: opacity 0.2s ease;
            pointer-events: none;
            white-space: pre-wrap;
            font-weight: 700;
            z-index: 5;
            margin-bottom: 2rem;
        }

        @media (min-width: 768px) {
            #subtitle-display {
                font-size: 2.5rem;
                margin-bottom: 0;
            }
        }

        .controls {
            position: absolute;
            bottom: 1rem;
            background: rgba(45, 45, 45, 0.9);
            padding: 0.5rem 0.8rem;
            border-radius: 12px;
            display: flex;
            gap: 0.75rem;
            align-items: center;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            width: 92%;
            max-width: 480px;
            justify-content: space-between;
            z-index: 15;
        }

        .preview-section.hide-cursor .controls {
            opacity: 0;
            pointer-events: none;
        }

        .time-display {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            color: #fbbf24;
            min-width: 60px;
            text-align: right;
        }

        button {
            transition: all 0.2s;
        }
        
        button:active {
            transform: scale(0.95);
        }

        input[type="range"] {
            flex: 1;
            height: 6px;
            border-radius: 3px;
        }

        #link-modal, #save-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .append-toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #4f46e5;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 0.85rem;
            font-weight: bold;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* Recording indicator */
        .recording-dot {
            display: none;
            position: absolute;
            top: 1rem;
            left: 1rem;
            background: rgba(220, 38, 38, 0.8);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            animation: pulse 1s infinite;
            z-index: 30;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

<div id="toast" class="append-toast">알림 메시지</div>

<div class="editor-container">
    <div class="input-section" id="input-section">
        <div class="flex justify-between items-center">
            <h1 class="text-sm font-bold text-indigo-400">Subtitle Smart Cloud</h1>
            <div class="flex gap-1">
                <button id="toggle-size-btn" class="md:hidden text-[10px] text-gray-300 bg-gray-700 px-2 py-0.5 rounded">확대</button>
                <div id="parse-status" class="text-[10px] text-gray-400 bg-black/30 px-2 py-0.5 rounded-full">
                    <span class="status-dot bg-yellow-500 inline-block w-2 h-2 rounded-full mr-1"></span> 대기
                </div>
            </div>
        </div>

        <!-- Cloud Sync & Load -->
        <div class="flex gap-2 bg-black/20 p-2 rounded-lg border border-white/5">
            <input type="text" id="load-code-input" class="flex-grow !bg-transparent border-none text-xs" placeholder="코드 입력 (예: AB1234)">
            <button id="load-btn" class="bg-indigo-700 text-white px-3 py-1 rounded text-[10px] font-bold">불러오기</button>
            <button id="save-btn" class="bg-emerald-600 text-white px-3 py-1 rounded text-[10px] font-bold">저장하기</button>
        </div>

        <div class="flex flex-col gap-1">
            <div class="flex justify-between items-end">
                <label class="text-[10px] text-gray-400 ml-1">아카라이브 링크</label>
                <button id="clear-all-btn" class="text-[10px] text-red-400 hover:text-red-300 mb-0.5">[비우기]</button>
            </div>
            <div class="flex gap-2">
                <input type="text" id="url-input" class="flex-grow" placeholder="https://arca.live/b/...">
                <button id="url-fetch-btn" class="bg-gray-700 hover:bg-gray-600 text-white px-3 py-1 rounded-lg text-xs font-bold">열기</button>
            </div>
        </div>
        
        <textarea id="vtt-input" spellcheck="false" placeholder="나누어서 복사한 뒤 '이어서 붙이기'를 사용하세요..."></textarea>

        <div class="grid grid-cols-2 gap-2">
            <button id="append-btn" class="bg-blue-700 text-white py-2 rounded-lg font-bold text-xs shadow-md">이어서 붙이기</button>
            <button id="clean-btn" class="bg-teal-700 text-white py-2 rounded-lg font-bold text-xs shadow-md">텍스트 정제</button>
        </div>
        
        <div class="grid grid-cols-5 gap-2 mt-1">
            <button id="apply-btn" class="col-span-3 bg-indigo-600 text-white py-3 rounded-lg font-bold text-sm shadow-md">자막 적용 및 재생</button>
            <button id="record-btn" class="col-span-2 bg-rose-700 text-white py-3 rounded-lg font-bold text-xs shadow-md">영상 추출</button>
        </div>
    </div>

    <div class="preview-section" id="fullscreen-target">
        <div class="recording-dot" id="recording-indicator">● RECORDING</div>
        <div id="subtitle-display">자막을 입력하고 적용을 눌러주세요</div>

        <div class="controls" id="ui-controls">
            <button id="play-pause">
                <svg id="play-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="white" viewBox="0 0 16 16">
                    <path d="m11.596 8.697-6.363 3.692c-.54.313-1.233-.066-1.233-.697V4.308c0-.63.692-1.01 1.233-.696l6.363 3.692a.802.802 0 0 1 0 1.393z"/>
                </svg>
                <svg id="pause-icon" class="hidden" xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="white" viewBox="0 0 16 16">
                    <path d="M5.5 3.5A1.5 1.5 0 0 1 7 5v6a1.5 1.5 0 0 1-3 0V5a1.5 1.5 0 0 1 1.5-1.5zm5 0A1.5 1.5 0 0 1 12 5v6a1.5 1.5 0 0 1-3 0V5a1.5 1.5 0 0 1 1.5-1.5z"/>
                </svg>
            </button>
            
            <input type="range" id="seek-bar" class="accent-indigo-500" value="0" step="0.01" min="0">
            
            <div class="time-display" id="time-display">00:00.0</div>
            
            <button id="fullscreen-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="white" viewBox="0 0 16 16">
                    <path d="M1.5 1a.5.5 0 0 0-.5.5v4a.5.5 0 0 1-1 0v-4A1.5 1.5 0 0 1 1.5 0h4a.5.5 0 0 1 0 1h-4zM10 .5a.5.5 0 0 1 .5-.5h4A1.5 1.5 0 0 1 16 1.5v4a.5.5 0 0 1-1 0v-4a.5.5 0 0 0-.5-.5h-4a.5.5 0 0 1-.5-.5zM.5 10a.5.5 0 0 1 .5.5v4a.5.5 0 0 0 .5.5h4a.5.5 0 0 1 0 1h-4A1.5 1.5 0 0 1 0 14.5v-4a.5.5 0 0 1 .5-.5zm15 0a.5.5 0 0 1 .5.5v4a1.5 1.5 0 0 1-1.5 1.5h-4a.5.5 0 0 1 0-1h4a.5.5 0 0 0 .5-.5v-4a.5.5 0 0 1 .5-.5z"/>
                </svg>
            </button>
        </div>
    </div>
</div>

<!-- Save Result Modal -->
<div id="save-modal" onclick="this.style.display='none'">
    <div class="bg-zinc-800 p-8 rounded-3xl max-w-sm w-full text-center border border-zinc-700 shadow-2xl" onclick="event.stopPropagation()">
        <div class="text-emerald-400 mb-2">
            <svg class="w-12 h-12 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
        </div>
        <h2 class="text-xl font-bold text-white mb-2">저장 완료!</h2>
        <p class="text-gray-400 text-sm mb-4">아래 코드를 보관하거나 공유하세요.</p>
        <div id="result-code" class="text-3xl font-black text-indigo-400 bg-black/40 py-4 rounded-xl tracking-widest mb-6">------</div>
        <button onclick="document.getElementById('save-modal').style.display='none'" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold">확인</button>
    </div>
</div>

<!-- URL Help Modal -->
<div id="link-modal" onclick="this.style.display='none'">
    <div class="bg-zinc-800 p-6 rounded-2xl max-w-sm text-center border border-zinc-700 shadow-2xl" onclick="event.stopPropagation()">
        <h2 class="text-xl font-bold text-indigo-400 mb-4">링크 연결 안내</h2>
        <p class="text-sm text-gray-300 leading-relaxed mb-6">
            게시글을 열고 본문을 <strong>나누어서 복사</strong>하신 뒤, <strong>[이어서 붙이기]</strong> 버튼을 반복해서 눌러주세요!
        </p>
        <div class="flex gap-2">
            <button id="modal-confirm-btn" class="flex-1 bg-indigo-600 text-white py-2 rounded-lg font-bold">게시글 열기</button>
            <button onclick="document.getElementById('link-modal').style.display='none'" class="flex-1 bg-zinc-600 text-white py-2 rounded-lg font-bold">닫기</button>
        </div>
    </div>
</div>

<!-- Firebase SDK -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // Firebase Config
    const firebaseConfig = JSON.parse(__firebase_config);
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'subtitle-previewer';

    let user = null;

    // UI Elements
    const vttInput = document.getElementById('vtt-input');
    const urlInput = document.getElementById('url-input');
    const loadCodeInput = document.getElementById('load-code-input');
    const subtitleDisplay = document.getElementById('subtitle-display');
    const seekBar = document.getElementById('seek-bar');
    const timeDisplay = document.getElementById('time-display');
    const toast = document.getElementById('toast');
    const recordingIndicator = document.getElementById('recording-indicator');

    // State
    let cues = [];
    let currentTime = 0;
    let isPlaying = false;
    let lastTimestamp = 0;
    let maxTime = 10;
    let hideTimer;
    let mediaRecorder = null;
    let recordedChunks = [];

    // Auth Initialization
    async function initAuth() {
        await signInAnonymously(auth);
    }
    initAuth();
    onAuthStateChanged(auth, (u) => { user = u; });

    function showToast(msg) {
        toast.innerText = msg;
        toast.style.opacity = "1";
        setTimeout(() => toast.style.opacity = "0", 2000);
    }

    // --- Cloud Functions ---
    document.getElementById('save-btn').onclick = async () => {
        if (!user) { showToast("로그인 중입니다..."); return; }
        if (!vttInput.value.trim()) { showToast("저장할 내용이 없습니다."); return; }

        const randomCode = Math.random().toString(36).substring(2, 8).toUpperCase();
        try {
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'subtitles', randomCode), {
                content: vttInput.value,
                url: urlInput.value,
                createdAt: Date.now()
            });
            document.getElementById('result-code').innerText = randomCode;
            document.getElementById('save-modal').style.display = 'flex';
        } catch (e) {
            console.error(e);
            showToast("저장에 실패했습니다.");
        }
    };

    document.getElementById('load-btn').onclick = async () => {
        if (!user) return;
        const code = loadCodeInput.value.trim().toUpperCase();
        if (!code) { showToast("코드를 입력해주세요."); return; }

        try {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'subtitles', code);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const data = docSnap.data();
                vttInput.value = data.content;
                urlInput.value = data.url || "";
                showToast("데이터를 불러왔습니다!");
                document.getElementById('apply-btn').click();
            } else {
                showToast("해당 코드를 찾을 수 없습니다.");
            }
        } catch (e) {
            console.error(e);
            showToast("불러오기 실패");
        }
    };

    // --- Video Recording Function ---
    document.getElementById('record-btn').onclick = async () => {
        if (isPlaying) togglePlay(); // 일단 정지
        currentTime = 0;
        updateDisplay();

        try {
            const stream = await navigator.mediaDevices.getDisplayMedia({
                video: { cursor: "never" },
                audio: false
            });

            recordedChunks = [];
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
            
            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };

            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `subtitle_video_${Date.now()}.webm`;
                a.click();
                recordingIndicator.style.display = 'none';
                showToast("영상이 저장되었습니다!");
                stream.getTracks().forEach(track => track.stop());
            };

            recordingIndicator.style.display = 'block';
            mediaRecorder.start();
            togglePlay(); // 재생 시작

            // 영상 길이만큼 자동 정지 로직 (옵션)
            setTimeout(() => {
                if (mediaRecorder && mediaRecorder.state === "recording") mediaRecorder.stop();
            }, (maxTime + 1) * 1000);

        } catch (err) {
            console.error(err);
            showToast("화면 녹화 권한이 필요합니다.");
        }
    };

    // --- Core Subtitle Logic ---
    function parseSubtitles(text) {
        const rawLines = text.split('\n');
        const results = [];
        let autoStartTime = 0;
        const durationPerLine = 2.5; 

        for (let i = 0; i < rawLines.length; i++) {
            const line = rawLines[i].trim();
            if (line === '') {
                autoStartTime += 1.0;
                continue;
            }
            const start = autoStartTime;
            const end = autoStartTime + durationPerLine;
            results.push({ start, end, text: line });
            autoStartTime = end + 0.3;
        }
        return results;
    }

    function updateDisplay() {
        if (currentTime >= maxTime - 0.1) {
            subtitleDisplay.innerText = "끝";
            subtitleDisplay.style.opacity = 0.5;
            if (isPlaying) { isPlaying = false; updatePlayStatus(); }
        } else {
            const activeCue = cues.find(cue => currentTime >= cue.start && currentTime < cue.end);
            if (activeCue) {
                if (subtitleDisplay.innerText !== activeCue.text) {
                    subtitleDisplay.innerText = activeCue.text;
                    subtitleDisplay.style.opacity = 1;
                }
            } else {
                subtitleDisplay.style.opacity = 0;
            }
        }
        timeDisplay.innerText = formatTime(currentTime);
        seekBar.value = currentTime;
    }

    function formatTime(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = (seconds % 60).toFixed(1);
        return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(4, '0')}`;
    }

    function animate(timestamp) {
        if (!isPlaying) return;
        if (!lastTimestamp) lastTimestamp = timestamp;
        const delta = (timestamp - lastTimestamp) / 1000;
        lastTimestamp = timestamp;
        currentTime += delta;
        if (currentTime >= maxTime) {
            currentTime = maxTime;
            isPlaying = false;
            updatePlayStatus();
            updateDisplay();
            if (mediaRecorder && mediaRecorder.state === "recording") mediaRecorder.stop();
            return;
        }
        updateDisplay();
        requestAnimationFrame(animate);
    }

    function updatePlayStatus() {
        document.getElementById('play-icon').classList.toggle('hidden', isPlaying);
        document.getElementById('pause-icon').classList.toggle('hidden', !isPlaying);
    }

    function togglePlay() {
        if (cues.length === 0) return;
        if (currentTime >= maxTime) currentTime = 0;
        isPlaying = !isPlaying;
        updatePlayStatus();
        if (isPlaying) { lastTimestamp = 0; requestAnimationFrame(animate); }
    }

    // --- Basic Event Listeners ---
    document.getElementById('apply-btn').onclick = () => {
        cues = parseSubtitles(vttInput.value);
        if (cues.length > 0) {
            maxTime = Math.max(...cues.map(c => c.end));
            seekBar.max = maxTime;
            currentTime = 0;
            updateDisplay();
            if (!isPlaying) togglePlay();
        }
    };

    document.getElementById('append-btn').onclick = async () => {
        try {
            const text = await navigator.clipboard.readText();
            if (text) {
                vttInput.value += (vttInput.value ? "\n\n" : "") + text;
                showToast("내용이 추가되었습니다!");
            }
        } catch(e) { showToast("클립보드 권한이 필요합니다."); }
    };

    document.getElementById('clean-btn').onclick = () => {
        vttInput.value = vttInput.value.split('\n').map(l => l.trim()).filter(l => l).join('\n\n');
        showToast("정제 완료");
    };

    document.getElementById('url-fetch-btn').onclick = () => {
        if (urlInput.value.startsWith('http')) {
            document.getElementById('link-modal').style.display = 'flex';
            document.getElementById('modal-confirm-btn').onclick = () => window.open(urlInput.value, '_blank');
        }
    };

    document.getElementById('play-pause').onclick = togglePlay;
    seekBar.oninput = (e) => { currentTime = parseFloat(e.target.value); updateDisplay(); };
    document.getElementById('toggle-size-btn').onclick = () => {
        const expanded = document.getElementById('input-section').classList.toggle('expanded');
        document.getElementById('toggle-size-btn').innerText = expanded ? "축소" : "확대";
    };
    document.getElementById('clear-all-btn').onclick = () => vttInput.value = "";
    document.getElementById('fullscreen-btn').onclick = () => {
        if (!document.fullscreenElement) document.getElementById('fullscreen-target').requestFullscreen();
        else document.exitFullscreen();
    };

    window.onload = () => {
        vttInput.value = "클라우드 저장 기능이 추가되었습니다!\n\n저장 버튼을 누르면 코드가 생성됩니다.\n해당 코드를 다른 기기에서 입력하면 그대로 불러옵니다.\n\n영상 추출 버튼으로 결과물을 저장해보세요.";
        document.getElementById('apply-btn').click();
    };
</script>

</body>
</html>
