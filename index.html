<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>자막 프리뷰어 - URL 및 스마트 클린</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #1a1a1a;
            color: #e5e5e5;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            height: -webkit-fill-available;
        }

        .editor-container {
            height: 100vh;
            height: 100svh;
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 768px) {
            .editor-container {
                flex-direction: row;
            }
            .input-section {
                width: 400px;
                height: 100% !important;
                border-right: 1px solid #404040;
                border-bottom: none;
            }
        }

        .input-section {
            background-color: #262626;
            display: flex;
            flex-direction: column;
            padding: 0.75rem;
            z-index: 20;
            height: 45%; 
            border-bottom: 1px solid #404040;
            flex-shrink: 0;
            gap: 0.5rem;
        }

        .preview-section {
            flex-grow: 1;
            background-color: #000;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding-bottom: env(safe-area-inset-bottom);
        }

        textarea {
            flex-grow: 1;
            background-color: #121212;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid #404040;
            resize: none;
            outline: none;
            font-size: 0.8rem;
            line-height: 1.4;
        }

        input[type="text"] {
            background-color: #121212;
            border: 1px solid #404040;
            color: white;
            padding: 0.4rem 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.8rem;
            outline: none;
        }

        #subtitle-display {
            color: white;
            font-size: 1.4rem;
            text-align: center;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 1);
            max-width: 90%;
            line-height: 1.4;
            transition: opacity 0.2s ease;
            pointer-events: none;
            white-space: pre-wrap;
            font-weight: 700;
            z-index: 5;
            margin-bottom: 2rem;
        }

        @media (min-width: 768px) {
            #subtitle-display {
                font-size: 2.5rem;
                margin-bottom: 0;
            }
        }

        .controls {
            position: absolute;
            bottom: 1rem;
            background: rgba(45, 45, 45, 0.9);
            padding: 0.5rem 0.8rem;
            border-radius: 12px;
            display: flex;
            gap: 0.75rem;
            align-items: center;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            width: 92%;
            max-width: 480px;
            justify-content: space-between;
            z-index: 15;
        }

        .preview-section.hide-cursor .controls {
            opacity: 0;
            pointer-events: none;
        }

        .time-display {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            color: #fbbf24;
            min-width: 60px;
            text-align: right;
        }

        button {
            transition: all 0.2s;
        }
        
        button:active {
            transform: scale(0.95);
        }

        input[type="range"] {
            flex: 1;
            height: 6px;
            border-radius: 3px;
        }

        /* Modal for Link Help */
        #link-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="editor-container">
    <div class="input-section">
        <div class="flex justify-between items-center">
            <h1 class="text-sm font-bold text-indigo-400">Subtitle Smart Editor</h1>
            <div id="parse-status" class="text-[10px] text-gray-400 bg-black/30 px-2 py-0.5 rounded-full">
                <span class="status-dot bg-yellow-500 inline-block w-2 h-2 rounded-full mr-1"></span> 대기 중
            </div>
        </div>

        <!-- URL 입력부 -->
        <div class="flex flex-col gap-1 mt-1">
            <label class="text-[10px] text-gray-400 ml-1">아카라이브/외부 링크 연동</label>
            <div class="flex gap-2">
                <input type="text" id="url-input" class="flex-grow" placeholder="https://arca.live/b/...">
                <button id="url-fetch-btn" class="bg-gray-700 hover:bg-gray-600 text-white px-3 py-1 rounded-lg text-xs font-bold">
                    열기
                </button>
            </div>
        </div>
        
        <textarea id="vtt-input" spellcheck="false" placeholder="본문을 여기에 붙여넣으세요..."></textarea>

        <div class="flex gap-2">
            <button id="clean-btn" class="flex-1 bg-teal-700 hover:bg-teal-600 text-white py-2 rounded-lg font-bold text-xs shadow-md">
                텍스트 정제
            </button>
            <button id="apply-btn" class="flex-[2] bg-indigo-600 hover:bg-indigo-500 text-white py-2 rounded-lg font-bold text-sm shadow-md">
                적용 및 재생
            </button>
        </div>
    </div>

    <div class="preview-section" id="fullscreen-target">
        <div id="subtitle-display">자막을 입력하고 적용을 눌러주세요</div>

        <div class="controls" id="ui-controls">
            <button id="play-pause">
                <svg id="play-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="white" viewBox="0 0 16 16">
                    <path d="m11.596 8.697-6.363 3.692c-.54.313-1.233-.066-1.233-.697V4.308c0-.63.692-1.01 1.233-.696l6.363 3.692a.802.802 0 0 1 0 1.393z"/>
                </svg>
                <svg id="pause-icon" class="hidden" xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="white" viewBox="0 0 16 16">
                    <path d="M5.5 3.5A1.5 1.5 0 0 1 7 5v6a1.5 1.5 0 0 1-3 0V5a1.5 1.5 0 0 1 1.5-1.5zm5 0A1.5 1.5 0 0 1 12 5v6a1.5 1.5 0 0 1-3 0V5a1.5 1.5 0 0 1 1.5-1.5z"/>
                </svg>
            </button>
            
            <input type="range" id="seek-bar" class="accent-indigo-500" value="0" step="0.01" min="0">
            
            <div class="time-display" id="time-display">00:00.0</div>
            
            <button id="fullscreen-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="white" viewBox="0 0 16 16">
                    <path d="M1.5 1a.5.5 0 0 0-.5.5v4a.5.5 0 0 1-1 0v-4A1.5 1.5 0 0 1 1.5 0h4a.5.5 0 0 1 0 1h-4zM10 .5a.5.5 0 0 1 .5-.5h4A1.5 1.5 0 0 1 16 1.5v4a.5.5 0 0 1-1 0v-4a.5.5 0 0 0-.5-.5h-4a.5.5 0 0 1-.5-.5zM.5 10a.5.5 0 0 1 .5.5v4a.5.5 0 0 0 .5.5h4a.5.5 0 0 1 0 1h-4A1.5 1.5 0 0 1 0 14.5v-4a.5.5 0 0 1 .5-.5zm15 0a.5.5 0 0 1 .5.5v4a1.5 1.5 0 0 1-1.5 1.5h-4a.5.5 0 0 1 0-1h4a.5.5 0 0 0 .5-.5v-4a.5.5 0 0 1 .5-.5z"/>
                </svg>
            </button>
        </div>
    </div>
</div>

<!-- Modal -->
<div id="link-modal" onclick="this.style.display='none'">
    <div class="bg-zinc-800 p-6 rounded-2xl max-w-sm text-center border border-zinc-700 shadow-2xl" onclick="event.stopPropagation()">
        <h2 class="text-xl font-bold text-indigo-400 mb-4">링크 연결 안내</h2>
        <p class="text-sm text-gray-300 leading-relaxed mb-6">
            브라우저 보안(CORS) 정책상 외부 사이트의 내용을 자동으로 긁어오는 것은 차단됩니다.<br><br>
            확인 버튼을 누르면 해당 게시글이 새 탭에서 열립니다. <strong>본문을 전체 복사(Ctrl+A, Ctrl+C)</strong>하여 편집기에 붙여넣어 주세요!
        </p>
        <div class="flex gap-2">
            <button id="modal-confirm-btn" class="flex-1 bg-indigo-600 text-white py-2 rounded-lg font-bold">게시글 열기</button>
            <button onclick="document.getElementById('link-modal').style.display='none'" class="flex-1 bg-zinc-600 text-white py-2 rounded-lg font-bold">닫기</button>
        </div>
    </div>
</div>

<script>
    const vttInput = document.getElementById('vtt-input');
    const urlInput = document.getElementById('url-input');
    const urlFetchBtn = document.getElementById('url-fetch-btn');
    const subtitleDisplay = document.getElementById('subtitle-display');
    const playPauseBtn = document.getElementById('play-pause');
    const seekBar = document.getElementById('seek-bar');
    const timeDisplay = document.getElementById('time-display');
    const applyBtn = document.getElementById('apply-btn');
    const cleanBtn = document.getElementById('clean-btn');
    const fullscreenBtn = document.getElementById('fullscreen-btn');
    const fullscreenTarget = document.getElementById('fullscreen-target');
    const playIcon = document.getElementById('play-icon');
    const pauseIcon = document.getElementById('pause-icon');
    const statusDot = document.querySelector('.status-dot');
    const statusText = document.getElementById('parse-status');
    const linkModal = document.getElementById('link-modal');
    const modalConfirmBtn = document.getElementById('modal-confirm-btn');

    let cues = [];
    let currentTime = 0;
    let isPlaying = false;
    let lastTimestamp = 0;
    let maxTime = 10;
    let hideTimer;

    // URL 이동 버튼
    urlFetchBtn.onclick = () => {
        const url = urlInput.value.trim();
        if (url.startsWith('http')) {
            linkModal.style.display = 'flex';
            modalConfirmBtn.onclick = () => {
                window.open(url, '_blank');
                linkModal.style.display = 'none';
            };
        } else {
            alert("올바른 URL을 입력해주세요.");
        }
    };

    // 텍스트 정제 (불필요한 공백 제거 등)
    cleanBtn.onclick = () => {
        let text = vttInput.value;
        // 여러 줄의 공백을 하나로, 양쪽 공백 제거
        text = text.split('\n').map(line => line.trim()).filter(line => line !== '').join('\n\n');
        vttInput.value = text;
        
        cleanBtn.innerText = "정제 완료";
        setTimeout(() => cleanBtn.innerText = "텍스트 정제", 1000);
    };

    function parseSubtitlesSmart(text) {
        const rawLines = text.split('\n');
        const timePairRegex = /((?:\d+:)?(?:\d+:)?\d+[.,]\d{1,3})\s*-->\s*((?:\d+:)?(?:\d+:)?\d+[.,]\d{1,3})/;
        const hasTimestamps = text.match(timePairRegex);
        
        if (hasTimestamps) {
            const results = [];
            let currentCue = null;
            for (let line of rawLines) {
                line = line.trim();
                const match = line.match(timePairRegex);
                if (match) {
                    if (currentCue) results.push(currentCue);
                    currentCue = { start: timeToSeconds(match[1]), end: timeToSeconds(match[2]), text: "" };
                } else if (currentCue && line && !/^\d+$/.test(line) && line.toUpperCase() !== 'WEBVTT') {
                    currentCue.text += (currentCue.text ? "\n" : "") + line;
                }
            }
            if (currentCue) results.push(currentCue);
            return results.filter(c => c.text).sort((a,b) => a.start - b.start);
        } else {
            const results = [];
            let autoStartTime = 0;
            const durationPerLine = 2.5; // 한 줄당 기본 시간 살짝 단축
            const dotPause = 0.5;   
            const emptyLinePause = 1.5; 

            for (let i = 0; i < rawLines.length; i++) {
                const line = rawLines[i].trim();
                
                if (line === '') {
                    autoStartTime += emptyLinePause;
                    continue;
                }

                const isEndedWithDot = line.endsWith('.') || line.endsWith('!') || line.endsWith('?');
                const start = autoStartTime;
                const end = autoStartTime + durationPerLine;
                
                results.push({
                    start: start,
                    end: end,
                    text: line
                });

                autoStartTime = end + (isEndedWithDot ? dotPause : 0.2); // 일반 줄바꿈도 살짝 여유
            }
            return results;
        }
    }

    function timeToSeconds(timeStr) {
        if (!timeStr) return 0;
        const normalized = timeStr.replace(',', '.');
        const parts = normalized.split(':').reverse();
        let seconds = 0;
        if (parts[0]) seconds += parseFloat(parts[0]);
        if (parts[1]) seconds += parseInt(parts[1]) * 60;
        if (parts[2]) seconds += parseInt(parts[2]) * 3600;
        return seconds;
    }

    function formatTime(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = (seconds % 60).toFixed(1);
        return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(4, '0')}`;
    }

    function updateDisplay() {
        if (currentTime >= maxTime - 0.1) {
            subtitleDisplay.innerText = "끝";
            subtitleDisplay.style.opacity = 0.5;
            if (isPlaying) {
                isPlaying = false;
                updatePlayStatus();
            }
        } else {
            const activeCue = cues.find(cue => currentTime >= cue.start && currentTime < cue.end);
            if (activeCue) {
                if (subtitleDisplay.innerText !== activeCue.text) {
                    subtitleDisplay.innerText = activeCue.text;
                    subtitleDisplay.style.opacity = 1;
                }
            } else {
                subtitleDisplay.style.opacity = 0;
            }
        }
        
        timeDisplay.innerText = formatTime(currentTime);
        seekBar.value = currentTime;
    }

    function animate(timestamp) {
        if (!isPlaying) return;
        if (!lastTimestamp) lastTimestamp = timestamp;
        const delta = (timestamp - lastTimestamp) / 1000;
        lastTimestamp = timestamp;

        currentTime += delta;
        
        if (currentTime >= maxTime) {
            currentTime = maxTime;
            isPlaying = false;
            updatePlayStatus();
            updateDisplay();
            return;
        }
        
        updateDisplay();
        requestAnimationFrame(animate);
    }

    function updatePlayStatus() {
        if (isPlaying) {
            playIcon.classList.add('hidden');
            pauseIcon.classList.remove('hidden');
        } else {
            playIcon.classList.remove('hidden');
            pauseIcon.classList.add('hidden');
        }
    }

    function togglePlay() {
        if (cues.length === 0) return;
        if (currentTime >= maxTime) currentTime = 0;
        
        isPlaying = !isPlaying;
        updatePlayStatus();
        if (isPlaying) {
            lastTimestamp = 0;
            requestAnimationFrame(animate);
        }
    }

    fullscreenBtn.onclick = () => {
        if (!document.fullscreenElement) {
            if (fullscreenTarget.requestFullscreen) fullscreenTarget.requestFullscreen();
            else if (fullscreenTarget.webkitRequestFullscreen) fullscreenTarget.webkitRequestFullscreen();
        } else {
            document.exitFullscreen();
        }
    };

    playPauseBtn.onclick = (e) => {
        e.stopPropagation();
        togglePlay();
    };

    seekBar.oninput = (e) => {
        currentTime = parseFloat(e.target.value);
        updateDisplay();
    };

    applyBtn.onclick = () => {
        const text = vttInput.value;
        const newCues = parseSubtitlesSmart(text);
        
        if (newCues.length > 0) {
            cues = newCues;
            maxTime = Math.max(...cues.map(c => c.end));
            seekBar.max = maxTime;
            currentTime = 0; 
            
            statusDot.className = "status-dot bg-green-500 inline-block w-2 h-2 rounded-full mr-1";
            statusText.innerHTML = `<span class="status-dot bg-green-500 inline-block w-2 h-2 rounded-full mr-1"></span> ${cues.length}줄 로드됨`;
            
            applyBtn.innerText = "재생 준비 완료";
            setTimeout(() => applyBtn.innerText = "적용 및 재생", 1000);
            updateDisplay();
            
            // 자동 재생 시작
            if (!isPlaying) togglePlay();
        }
    };

    fullscreenTarget.onclick = () => {
        fullscreenTarget.classList.remove('hide-cursor');
        clearTimeout(hideTimer);
        hideTimer = setTimeout(() => {
            if (isPlaying) fullscreenTarget.classList.add('hide-cursor');
        }, 3000);
    };

    // 초기 예시 데이터
    window.onload = () => {
        vttInput.value = "아카라이브 링크를 위에 입력해보세요!\n\n링크를 열고 본문을 복사해서 여기에 붙여넣은 뒤\n텍스트 정제를 누르면 깔끔해집니다.\n\n준비가 되면 적용 및 재생을 누르세요.";
        applyBtn.click();
    };
</script>

</body>
</html>
</html>
