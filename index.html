<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>자막 프리뷰어 - 기본 버전</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #1a1a1a; color: #e5e5e5; margin: 0; overflow: hidden; height: 100vh; }
        .editor-container { height: 100vh; display: flex; flex-direction: column; }
        @media (min-width: 768px) { .editor-container { flex-direction: row; } .input-section { width: 380px; height: 100% !important; border-right: 1px solid #404040; } }
        .input-section { background-color: #262626; display: flex; flex-direction: column; padding: 1rem; z-index: 20; height: 40%; border-bottom: 1px solid #404040; flex-shrink: 0; }
        .preview-section { flex-grow: 1; background-color: #000; position: relative; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        textarea { flex-grow: 1; background-color: #121212; color: #00ff41; font-family: 'Courier New', monospace; padding: 0.75rem; border-radius: 0.5rem; border: 1px solid #404040; resize: none; outline: none; font-size: 0.85rem; line-height: 1.6; }
        #subtitle-display { color: white; font-size: 1.8rem; text-align: center; text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.9); max-width: 85%; font-weight: 700; z-index: 5; transition: opacity 0.15s; pointer-events: none; }
        @media (min-width: 768px) { #subtitle-display { font-size: 3rem; } }
        .controls { position: absolute; bottom: 2rem; background: rgba(30, 30, 30, 0.8); padding: 0.75rem 1.25rem; border-radius: 20px; display: flex; gap: 1rem; align-items: center; width: 90%; max-width: 600px; z-index: 15; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .btn-primary { background-color: #4f46e5; color: white; padding: 0.6rem; border-radius: 0.75rem; font-weight: 700; font-size: 0.9rem; transition: all 0.2s; }
        .btn-primary:hover { background-color: #4338ca; }
        .btn-primary:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="editor-container">
    <div class="input-section">
        <h1 class="text-sm font-bold text-indigo-400 mb-3 flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                <path d="M14.5 3a.5.5 0 0 1 .5.5v9a.5.5 0 0 1-.5.5h-13a.5.5 0 0 1-.5-.5v-9a.5.5 0 0 1 .5-.5h13zm-13-1A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h13a1.5 1.5 0 0 0 1.5-1.5v-9A1.5 1.5 0 0 0 14.5 2h-13z"/>
                <path d="M3 5.5a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 0 1h-9a.5.5 0 0 1-.5-.5zM3 8a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 0 1h-9A.5.5 0 0 1 3 8zm0 2.5a.5.5 0 0 1 .5-.5h6a.5.5 0 0 1 0 1h-6a.5.5 0 0 1-.5-.5z"/>
            </svg>
            Subtitle Editor
        </h1>
        
        <textarea id="vtt-input" spellcheck="false" placeholder="내용을 입력하세요.">자막 프리뷰어에 오신 것을 환영합니다.
--
구분선(--)을 사용하여 자막을 나눌 수 있습니다.
--
하단의 재생 버튼을 눌러 확인해 보세요.</textarea>

        <button id="apply-btn" class="btn-primary mt-4">
            자막 데이터 업데이트
        </button>
    </div>

    <div class="preview-section">
        <div id="subtitle-display">입력 후 업데이트를 눌러주세요</div>
        
        <div class="controls">
            <button id="play-pause" class="text-white hover:text-indigo-400 transition-colors">
                <svg id="play-svg" xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" viewBox="0 0 16 16">
                    <path d="m11.596 8.697-6.363 3.692c-.54.313-1.233-.066-1.233-.697V4.308c0-.63.692-1.01 1.233-.696l6.363 3.692a.802.802 0 0 1 0 1.393z"/>
                </svg>
                <svg id="pause-svg" class="hidden" xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M5.5 3.5A1.5 1.5 0 0 1 7 5v6a1.5 1.5 0 0 1-3 0V5a1.5 1.5 0 0 1 1.5-1.5zm5 0A1.5 1.5 0 0 1 12 5v6a1.5 1.5 0 0 1-3 0V5a1.5 1.5 0 0 1 1.5-1.5z"/>
                </svg>
            </button>
            <input type="range" id="seek-bar" class="flex-grow accent-indigo-500 h-1.5" value="0" step="0.1" min="0">
            <span id="time-display" class="text-xs text-indigo-300 font-mono w-12 text-right">00.0s</span>
        </div>
    </div>
</div>

<script>
    const vttInput = document.getElementById('vtt-input');
    const subtitleDisplay = document.getElementById('subtitle-display');
    const playPauseBtn = document.getElementById('play-pause');
    const seekBar = document.getElementById('seek-bar');
    const timeDisplay = document.getElementById('time-display');
    const applyBtn = document.getElementById('apply-btn');
    const playSvg = document.getElementById('play-svg');
    const pauseSvg = document.getElementById('pause-svg');

    let cues = [];
    let currentTime = 0;
    let isPlaying = false;
    let totalDuration = 0;
    let timerId = null;

    function parseSubtitles() {
        const text = vttInput.value;
        const blocks = text.split(/\n--\n|--/).map(b => b.trim()).filter(b => b);
        
        cues = [];
        let startTime = 0;
        const durationPerBlock = 2.5; // 기본적으로 한 문장당 2.5초 노출

        blocks.forEach((content) => {
            cues.push({
                text: content,
                start: startTime,
                end: startTime + durationPerBlock
            });
            startTime += durationPerBlock;
        });

        totalDuration = startTime;
        seekBar.max = totalDuration;
        currentTime = 0;
        updateUI();
    }

    function updateUI() {
        const activeCue = cues.find(c => currentTime >= c.start && currentTime < c.end);
        
        if (activeCue) {
            subtitleDisplay.innerText = activeCue.text;
            subtitleDisplay.style.opacity = 1;
        } else {
            subtitleDisplay.style.opacity = 0;
        }

        timeDisplay.innerText = `${currentTime.toFixed(1)}s`;
        seekBar.value = currentTime;
    }

    applyBtn.onclick = () => {
        parseSubtitles();
        subtitleDisplay.innerText = "데이터가 업데이트되었습니다.";
        subtitleDisplay.style.opacity = 1;
    };

    playPauseBtn.onclick = () => {
        isPlaying = !isPlaying;
        
        if (isPlaying) {
            playSvg.classList.add('hidden');
            pauseSvg.classList.remove('hidden');
            
            if (currentTime >= totalDuration) currentTime = 0;

            timerId = setInterval(() => {
                currentTime += 0.1;
                if (currentTime >= totalDuration) {
                    currentTime = totalDuration;
                    clearInterval(timerId);
                    isPlaying = false;
                    playSvg.classList.remove('hidden');
                    pauseSvg.classList.add('hidden');
                }
                updateUI();
            }, 100);
        } else {
            playSvg.classList.remove('hidden');
            pauseSvg.classList.add('hidden');
            clearInterval(timerId);
        }
    };

    seekBar.oninput = (e) => {
        currentTime = parseFloat(e.target.value);
        updateUI();
    };

    // 초기 파싱
    parseSubtitles();
</script>

</body>
</html>
